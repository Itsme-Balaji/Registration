<html>
    <head>
        <title>Registration</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
                body{
                justify-content: center;
                display: flex;
                align-items: center;
                position: relative;
                top: 20px;
                background-image: url(images/shadow.jpg);
                background-repeat: no-repeat;
                background-size: cover;
            }
            .registration{
                background: transparent;
                width: 380px;
                height: 383px;
                border: 1px solid black;
                border-radius: 10px;
                backdrop-filter: blur(6px);
            }
            .login{
                text-align: center;
                position: relative;
                top: 15px;
                color: white;
            }
            .name-box{

            }
            .box-design-name{
                height: 35px;
                width: 78%;
                border-radius: 20px;
                padding-left: 15px;
                text-align: justify;
                color: #100f0f;
                position: relative;
                left: 45px;
                margin-top: 30px;
                margin-bottom: 0px;
                outline: 0;
                background: transparent;
                border: 1px solid white;
                color: white;
            }
            .box-design-email{
                height: 35px;
                width: 78%;
                border-radius: 20px;
                padding-left: 15px;
                text-align: justify;
                color: #100f0f;
                position: relative;
                left: 45px;
                margin-top: 11px;
                outline: 0;
                background: transparent;
                border: 1px solid white;
                color: white;
            }
            .box-design-password{
                height: 35px;
                width: 78%;
                border-radius: 20px;
                padding-left: 15px;
                text-align: justify;
                color: #100f0f;
                position: relative;
                left: 45px;
                margin-top: 11px;
                outline: 0;
                background: transparent;
                border: 1px solid white;
                color: white;
            }.box-design-signin{
                height: 35px;
                width: 78%;
                border-radius: 20px;
                padding-left: 15px;
                text-align: justify;
                color: #100f0f;
                position: relative;
                left: 45px;
                margin-top: 11px;
                outline: 0;
                color: black;
                font-size: 18;
                font-weight: bold;
                text-align: center;
                border: 1px solid white;
            }
            .remember-box{
                display: inline-block;
                margin-left: 45px;
                margin-top: 10px;
                color: white;
            }
            .forgot-box{
                display: inline-block;
                margin-left: 57px;
                color: white;
            }
            .name-box input::placeholder{
                color: white;
                
            }
            .email-box input::placeholder{
                color: white;
            }
            .password-box input::placeholder{
                color: white;
            }
            .fa-solid{
                color: white;
                position: relative;
                top: 1px;
            }
            .signup-box{
                text-align: center;
                position: relative;
                top: 15px;
                color: white;
                letter-spacing: 1;
            }
            .signin-design{

            }
            .please{
                color: cyan;
                text-decoration: none;
            }
            .forgot-design{
                text-decoration:none ;
                color: white;
            }
         </style>
    </head>
    <body> 
        <div class="registration">
            <h1 class="login">Login</h1>
            <form action="" class="form-design" >
                <div class="name-box">
                    <input class="box-design-name" type="text" placeholder="Name" required />
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="email-box">
                    <input class="box-design-email" type="email" placeholder="Email" required />
                </div>
                <div class="password-box">
                    <input class="box-design-password" type="password" placeholder="password" required />
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="remember-box">
                    <label><input type="checkbox" />Remember me</label>
                </div>
                <div class="forgot-box">
                    <a href="" class="forgot-design">forgot password?</a>
                </div>
                <div class="signin-box">
                    <input class="box-design-signin" type="submit" value="Signin"/>
                </div>
                <div class="signup-box">
                    <span class="signup-design">Don't have an account? <a href="" class="please">Signup...</a>
                    </span>
                    </span>
                </div>

            </form>
        </div>

    </body>
    </html>
