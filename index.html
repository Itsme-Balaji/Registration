<html>
    <head>
        <title>Registration</title>
        <link href="./css/style.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        
    </head>
    <body> 
        <div class="registration">
            <h1 class="login">Login</h1>
            <form action="" class="form-design" >
                <div class="name-box">
                    <input class="box-design-name" type="text" placeholder="Name" required />
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="email-box">
                    <input class="box-design-email" type="email" placeholder="Email" required />
                </div>
                <div class="password-box">
                    <input class="box-design-password" type="password" placeholder="password" required />
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="remember-box">
                    <label><input type="checkbox" />Remember me</label>
                </div>
                <div class="forgot-box">
                    <a href="" class="forgot-design">forgot password?</a>
                </div>
                <div class="signin-box">
                    <input class="box-design-signin" type="submit" value="Signin"/>
                </div>
                <div class="signup-box">
                    <span class="signup-design">Don't have an account? <a href="" class="please">Signup...</a>
                    </span>
                    </span>
                </div>

            </form>
        </div>

    </body>
    </html>
